<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <!-- ===== BACKGROUND ===== -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#05020e"/>
      <stop offset="40%"  stop-color="#0d0820"/>
      <stop offset="100%" stop-color="#04080f"/>
    </linearGradient>

    <!-- ===== ORB GRADIENTS ===== -->
    <radialGradient id="og1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="og2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#1d4ed8" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="og3" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#06b6d4" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="og4" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#9333ea" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#9333ea" stop-opacity="0"/>
    </radialGradient>

    <!-- ===== GLASS FILL ===== -->
    <linearGradient id="gf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="55%"  stop-color="#a0d2eb" stop-opacity="0.025"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.055"/>
    </linearGradient>

    <!-- ===== GLASS TOP HIGHLIGHT (specular reflection) ===== -->
    <linearGradient id="gh" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="30%"  stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- ===== BADGE GRADIENT ===== -->
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0.5"/>
    </linearGradient>

    <!-- ===== ACCENT LINE GRADIENT ===== -->
    <linearGradient id="al" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7ec8e3" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#7ec8e3" stop-opacity="0.9"/>
      <stop offset="50%"  stop-color="#a0d2eb" stop-opacity="1"/>
      <stop offset="80%"  stop-color="#7ec8e3" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7ec8e3" stop-opacity="0"/>
    </linearGradient>

    <!-- ===== DOT GRID PATTERN ===== -->
    <pattern id="dots" width="60" height="60" patternUnits="userSpaceOnUse">
      <circle cx="0"  cy="0"  r="0.7" fill="#3d3463" opacity="0.7"/>
      <circle cx="60" cy="0"  r="0.7" fill="#3d3463" opacity="0.7"/>
      <circle cx="0"  cy="60" r="0.7" fill="#3d3463" opacity="0.7"/>
      <circle cx="60" cy="60" r="0.7" fill="#3d3463" opacity="0.7"/>
    </pattern>

    <!-- ===== HEAVY BLUR (for orbs) ===== -->
    <filter id="ob" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>

    <!-- ===== SOFT GLOW (for dots &amp; borders) ===== -->
    <filter id="sg" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- ===== PULSING TEXT GLOW ===== -->
    <filter id="tg" x="-15%" y="-60%" width="130%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b">
        <animate attributeName="stdDeviation" values="2;8;2" dur="3.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
      </feGaussianBlur>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- ===== PANEL GLOW BORDER FILTER ===== -->
    <filter id="pg" x="-5%" y="-10%" width="110%" height="120%">
      <feGaussianBlur stdDeviation="4" result="b">
        <animate attributeName="stdDeviation" values="3;8;3" dur="5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
      </feGaussianBlur>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ============================================================ -->
  <!-- LAYER 1: BACKGROUND                                          -->
  <!-- ============================================================ -->
  <rect width="900" height="300" fill="url(#bg)"/>

  <!-- Dot grid overlay -->
  <rect width="900" height="300" fill="url(#dots)" opacity="0.45"/>

  <!-- ============================================================ -->
  <!-- LAYER 2: FLOATING ORBS (SMIL float animations)              -->
  <!-- ============================================================ -->

  <!-- Left purple orb -->
  <ellipse cx="90" cy="155" rx="165" ry="130" fill="url(#og1)" filter="url(#ob)">
    <animate attributeName="cy" values="155;138;155" dur="6.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
    <animate attributeName="rx" values="165;180;165" dur="6.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
  </ellipse>

  <!-- Right blue orb -->
  <ellipse cx="820" cy="145" rx="175" ry="135" fill="url(#og2)" filter="url(#ob)">
    <animate attributeName="cy" values="145;163;145" dur="7.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
    <animate attributeName="rx" values="175;160;175" dur="7.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
  </ellipse>

  <!-- Top center cyan orb -->
  <ellipse cx="455" cy="52" rx="115" ry="85" fill="url(#og3)" filter="url(#ob)">
    <animate attributeName="cx" values="455;478;455" dur="5.4s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
    <animate attributeName="cy" values="52;40;52" dur="5.4s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
  </ellipse>

  <!-- Bottom right violet orb -->
  <ellipse cx="720" cy="260" rx="120" ry="90" fill="url(#og4)" filter="url(#ob)">
    <animate attributeName="cx" values="720;698;720" dur="8.1s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
    <animate attributeName="cy" values="260;275;260" dur="8.1s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
  </ellipse>

  <!-- ============================================================ -->
  <!-- LAYER 3: STAR PARTICLES (twinkling SMIL)                    -->
  <!-- ============================================================ -->
  <g>
    <circle cx="42"  cy="22"  r="1.3" fill="#a0d2eb"><animate attributeName="opacity" values="0.15;1;0.15"   dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="168" cy="55"  r="0.9" fill="#ffffff" ><animate attributeName="opacity" values="0.1;0.75;0.1"  dur="4.3s" repeatCount="indefinite"/></circle>
    <circle cx="310" cy="18"  r="1.5" fill="#7ec8e3" ><animate attributeName="opacity" values="0.2;1;0.2"    dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="488" cy="11"  r="1.0" fill="#ffffff" ><animate attributeName="opacity" values="0.1;0.8;0.1"  dur="5.2s" repeatCount="indefinite"/></circle>
    <circle cx="643" cy="28"  r="1.3" fill="#a0d2eb" ><animate attributeName="opacity" values="0.2;0.9;0.2"  dur="3.7s" repeatCount="indefinite"/></circle>
    <circle cx="792" cy="44"  r="0.9" fill="#ffffff" ><animate attributeName="opacity" values="0.1;0.7;0.1"  dur="4.9s" repeatCount="indefinite"/></circle>
    <circle cx="862" cy="17"  r="1.2" fill="#7c3aed" ><animate attributeName="opacity" values="0.2;1;0.2"    dur="3.0s" repeatCount="indefinite"/></circle>
    <circle cx="25"  cy="205" r="1.0" fill="#ffffff" ><animate attributeName="opacity" values="0.1;0.65;0.1" dur="4.4s" repeatCount="indefinite"/></circle>
    <circle cx="118" cy="272" r="1.5" fill="#7ec8e3" ><animate attributeName="opacity" values="0.2;0.95;0.2" dur="3.8s" repeatCount="indefinite"/></circle>
    <circle cx="248" cy="285" r="0.8" fill="#ffffff" ><animate attributeName="opacity" values="0.1;0.8;0.1"  dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="388" cy="278" r="1.2" fill="#a0d2eb" ><animate attributeName="opacity" values="0.15;1;0.15"  dur="5.5s" repeatCount="indefinite"/></circle>
    <circle cx="562" cy="290" r="0.9" fill="#ffffff" ><animate attributeName="opacity" values="0.1;0.7;0.1"  dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="662" cy="268" r="1.3" fill="#a0d2eb" ><animate attributeName="opacity" values="0.2;1;0.2"    dur="4.1s" repeatCount="indefinite"/></circle>
    <circle cx="780" cy="283" r="1.1" fill="#7ec8e3" ><animate attributeName="opacity" values="0.15;0.9;0.15" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle cx="870" cy="248" r="1.4" fill="#ffffff" ><animate attributeName="opacity" values="0.1;0.75;0.1" dur="6.0s" repeatCount="indefinite"/></circle>
    <circle cx="878" cy="130" r="0.8" fill="#7c3aed" ><animate attributeName="opacity" values="0.2;1;0.2"    dur="3.5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- ============================================================ -->
  <!-- LAYER 4: GLASS MORPHISM PANEL                               -->
  <!-- ============================================================ -->

  <!-- Outer pulsing glow border -->
  <rect x="44" y="52" width="812" height="196" rx="24"
        fill="none" stroke="#7c3aed" stroke-width="1.5"
        stroke-opacity="0.25" filter="url(#pg)">
    <animate attributeName="stroke-opacity" values="0.2;0.55;0.2" dur="5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </rect>

  <!-- Main frosted glass panel -->
  <rect x="50" y="57" width="800" height="186" rx="20" fill="url(#gf)"/>

  <!-- Glass edge border -->
  <rect x="50" y="57" width="800" height="186" rx="20"
        fill="none" stroke="#ffffff" stroke-width="0.7" stroke-opacity="0.12"/>

  <!-- Top specular highlight (frosted glass reflection) -->
  <rect x="52" y="59" width="796" height="75" rx="18" fill="url(#gh)"/>

  <!-- Subtle inner separator line -->
  <line x1="90" y1="196" x2="810" y2="196" stroke="#7ec8e3" stroke-opacity="0.1" stroke-width="0.8"/>

  <!-- ============================================================ -->
  <!-- LAYER 5: DECORATIVE CHROME ELEMENTS                         -->
  <!-- ============================================================ -->

  <!-- macOS traffic light buttons (top left) -->
  <circle cx="76"  cy="80" r="5" fill="#ff5f57" opacity="0.85"/>
  <circle cx="91"  cy="80" r="5" fill="#febc2e" opacity="0.85"/>
  <circle cx="106" cy="80" r="5" fill="#28c840" opacity="0.85"/>

  <!-- Top left bracket decoration -->
  <path d="M 58 68 L 58 58 L 68 58" fill="none" stroke="#a0d2eb" stroke-width="1.5" stroke-opacity="0.35" stroke-linecap="round"/>

  <!-- Top right bracket decoration -->
  <path d="M 832 68 L 832 58 L 822 58" fill="none" stroke="#a0d2eb" stroke-width="1.5" stroke-opacity="0.35" stroke-linecap="round"/>

  <!-- Bottom left bracket -->
  <path d="M 58 232 L 58 242 L 68 242" fill="none" stroke="#a0d2eb" stroke-width="1.5" stroke-opacity="0.35" stroke-linecap="round"/>

  <!-- Bottom right bracket -->
  <path d="M 832 232 L 832 242 L 822 242" fill="none" stroke="#a0d2eb" stroke-width="1.5" stroke-opacity="0.35" stroke-linecap="round"/>

  <!-- AI ENGINEER badge (top right) -->
  <rect x="744" y="67" width="98" height="24" rx="12" fill="url(#bg2)" stroke="#7c3aed" stroke-opacity="0.55" stroke-width="0.8"/>
  <text x="793" y="83.5" font-family="'Courier New', Consolas, monospace" font-size="10.5"
        fill="#c4b5fd" text-anchor="middle" letter-spacing="1" opacity="0.95">AI ENGINEER</text>

  <!-- Small decoration dots row (below traffic lights) -->
  <circle cx="76"  cy="95" r="1.5" fill="#7ec8e3" opacity="0.3"/>
  <circle cx="83"  cy="95" r="1.5" fill="#7ec8e3" opacity="0.3"/>
  <circle cx="90"  cy="95" r="1.5" fill="#7ec8e3" opacity="0.3"/>
  <circle cx="97"  cy="95" r="1.5" fill="#7ec8e3" opacity="0.3"/>

  <!-- ============================================================ -->
  <!-- LAYER 6: MAIN TYPOGRAPHY                                    -->
  <!-- ============================================================ -->

  <!-- Main Name - primary text with pulsing glow -->
  <text x="450" y="145"
        font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="50" font-weight="800"
        fill="#a0d2eb"
        text-anchor="middle"
        letter-spacing="4"
        filter="url(#tg)">SHASHANK</text>

  <!-- Animated accent line under name -->
  <rect x="285" y="157" width="330" height="1.8" rx="1" fill="url(#al)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </rect>

  <!-- Pulsing left dot on accent line -->
  <circle cx="286" cy="158" r="3.5" fill="#7ec8e3" filter="url(#sg)">
    <animate attributeName="opacity" values="1;0.15;1" dur="3.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="r" values="3.5;5.5;3.5" dur="3.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>

  <!-- Pulsing right dot on accent line -->
  <circle cx="614" cy="158" r="3.5" fill="#7ec8e3" filter="url(#sg)">
    <animate attributeName="opacity" values="0.15;1;0.15" dur="3.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="r" values="3.5;5.5;3.5" dur="3.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>

  <!-- Role / subtitle text -->
  <text x="450" y="180"
        font-family="'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="15" font-weight="400"
        fill="#7ec8e3"
        text-anchor="middle"
        letter-spacing="3.5"
        opacity="0.95">LLM BUILDER  ·  RAG ARCHITECT  ·  AI SYSTEMS</text>

  <!-- Tech stack hint (very subtle) -->
  <text x="450" y="218"
        font-family="'Courier New', Consolas, monospace"
        font-size="11.5"
        fill="#ffffff"
        text-anchor="middle"
        letter-spacing="1.2"
        opacity="0.32">LangChain · LangGraph · FastAPI · PyTorch · HuggingFace · Ollama</text>

  <!-- Small pulse indicator (bottom right corner of glass) -->
  <circle cx="822" cy="230" r="4" fill="#7c3aed" opacity="0.6" filter="url(#sg)">
    <animate attributeName="r" values="4;7;4" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="822" cy="230" r="2.5" fill="#c4b5fd">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Hyderabad location tag (bottom left) -->
  <text x="74" y="232"
        font-family="'Courier New', Consolas, monospace"
        font-size="10"
        fill="#a0d2eb"
        text-anchor="start"
        opacity="0.45">📍 Hyderabad, India</text>

</svg>
