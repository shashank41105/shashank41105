<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 250" width="900" height="250">
  <defs>
    <!-- ===== BACKGROUND ===== -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#05020e"/>
      <stop offset="40%"  stop-color="#0d0820"/>
      <stop offset="100%" stop-color="#04080f"/>
    </linearGradient>

    <!-- ===== ORB GRADIENTS ===== -->
    <radialGradient id="og1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="og2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#06b6d4" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>

    <!-- ===== GLASS FILL ===== -->
    <linearGradient id="gf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="55%"  stop-color="#a0d2eb" stop-opacity="0.025"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.055"/>
    </linearGradient>

    <!-- ===== GLASS TOP HIGHLIGHT ===== -->
    <linearGradient id="gh" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="30%"  stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- ===== BADGE GRADIENT ===== -->
    <linearGradient id="badge_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0.3"/>
    </linearGradient>

    <!-- ===== DOT GRID PATTERN ===== -->
    <pattern id="dots" width="60" height="60" patternUnits="userSpaceOnUse">
      <circle cx="0"  cy="0"  r="0.7" fill="#3d3463" opacity="0.7"/>
      <circle cx="60" cy="0"  r="0.7" fill="#3d3463" opacity="0.7"/>
      <circle cx="0"  cy="60" r="0.7" fill="#3d3463" opacity="0.7"/>
      <circle cx="60" cy="60" r="0.7" fill="#3d3463" opacity="0.7"/>
    </pattern>

    <!-- ===== HEAVY BLUR ===== -->
    <filter id="ob" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>

    <!-- ===== PULSING GLOW FILTER ===== -->
    <filter id="tg" x="-15%" y="-60%" width="130%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b">
        <animate attributeName="stdDeviation" values="1.5;4;1.5" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
      </feGaussianBlur>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- ===== PANEL GLOW BORDER FILTER ===== -->
    <filter id="pg" x="-5%" y="-10%" width="110%" height="120%">
      <feGaussianBlur stdDeviation="4" result="b">
        <animate attributeName="stdDeviation" values="3;6;3" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
      </feGaussianBlur>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- BACKGROUND -->
  <rect width="900" height="250" fill="url(#bg)"/>
  <rect width="900" height="250" fill="url(#dots)" opacity="0.45"/>

  <!-- FLOATING ORBS -->
  <ellipse cx="250" cy="125" rx="140" ry="100" fill="url(#og1)" filter="url(#ob)">
    <animate attributeName="cy" values="125;110;125" dur="8s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
  </ellipse>
  <ellipse cx="650" cy="125" rx="140" ry="100" fill="url(#og2)" filter="url(#ob)">
    <animate attributeName="cy" values="125;140;125" dur="9s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
  </ellipse>

  <!-- GLASS MORPHISM PANEL -->
  <!-- Outer pulsing glow border -->
  <rect x="44" y="27" width="812" height="196" rx="24"
        fill="none" stroke="#7c3aed" stroke-width="1.2"
        stroke-opacity="0.2" filter="url(#pg)">
    <animate attributeName="stroke-opacity" values="0.15;0.45;0.15" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </rect>

  <!-- Main frosted glass panel -->
  <rect x="50" y="32" width="800" height="186" rx="20" fill="url(#gf)"/>
  <rect x="50" y="32" width="800" height="186" rx="20"
        fill="none" stroke="#ffffff" stroke-width="0.7" stroke-opacity="0.12"/>
  <rect x="52" y="34" width="796" height="50" rx="18" fill="url(#gh)"/>

  <!-- macOS traffic light buttons (top left) -->
  <circle cx="76"  cy="52" r="4" fill="#ff5f57" opacity="0.85"/>
  <circle cx="88"  cy="52" r="4" fill="#febc2e" opacity="0.85"/>
  <circle cx="100" cy="52" r="4" fill="#28c840" opacity="0.85"/>

  <!-- Brackets -->
  <path d="M 58 43 L 58 38 L 68 38" fill="none" stroke="#a0d2eb" stroke-width="1.2" stroke-opacity="0.3" stroke-linecap="round"/>
  <path d="M 842 43 L 842 38 L 832 38" fill="none" stroke="#a0d2eb" stroke-width="1.2" stroke-opacity="0.3" stroke-linecap="round"/>
  <path d="M 58 207 L 58 212 L 68 212" fill="none" stroke="#a0d2eb" stroke-width="1.2" stroke-opacity="0.3" stroke-linecap="round"/>
  <path d="M 842 207 L 842 212 L 832 212" fill="none" stroke="#a0d2eb" stroke-width="1.2" stroke-opacity="0.3" stroke-linecap="round"/>

  <!-- TITLE: CORE TECH STACK -->
  <text x="450" y="55" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle" letter-spacing="3" opacity="0.85">DEVELOPMENT MATRIX</text>

  <!-- COLUMN 1: LANGUAGES -->
  <g>
    <text x="150" y="88" font-family="'Courier New', Consolas, monospace" font-size="10.5" font-weight="bold" fill="#38bdf8" text-anchor="middle" letter-spacing="1.5" filter="url(#tg)">LANGUAGES</text>
    
    <!-- Python -->
    <rect x="95" y="102" width="110" height="22" rx="11" fill="url(#badge_bg)" stroke="#7c3aed" stroke-opacity="0.4" stroke-width="0.8"/>
    <text x="150" y="116" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#e2e8f0" text-anchor="middle">Python</text>

    <!-- TypeScript -->
    <rect x="95" y="130" width="110" height="22" rx="11" fill="url(#badge_bg)" stroke="#7c3aed" stroke-opacity="0.4" stroke-width="0.8"/>
    <text x="150" y="144" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#e2e8f0" text-anchor="middle">TypeScript</text>

    <!-- JavaScript -->
    <rect x="95" y="158" width="110" height="22" rx="11" fill="url(#badge_bg)" stroke="#7c3aed" stroke-opacity="0.4" stroke-width="0.8"/>
    <text x="150" y="172" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#e2e8f0" text-anchor="middle">JavaScript</text>

    <!-- SQL & Java -->
    <rect x="95" y="186" width="52" height="22" rx="11" fill="url(#badge_bg)" stroke="#7c3aed" stroke-opacity="0.4" stroke-width="0.8"/>
    <text x="121" y="200" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#e2e8f0" text-anchor="middle">SQL</text>

    <rect x="153" y="186" width="52" height="22" rx="11" fill="url(#badge_bg)" stroke="#7c3aed" stroke-opacity="0.4" stroke-width="0.8"/>
    <text x="179" y="200" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#e2e8f0" text-anchor="middle">Java</text>
  </g>

  <!-- COLUMN 2: AI & ORCHESTRATION -->
  <g>
    <text x="350" y="88" font-family="'Courier New', Consolas, monospace" font-size="10.5" font-weight="bold" fill="#38bdf8" text-anchor="middle" letter-spacing="1.5" filter="url(#tg)">AI / AGENTS</text>
    
    <!-- LangGraph -->
    <rect x="295" y="102" width="110" height="22" rx="11" fill="url(#badge_bg)" stroke="#7ec8e3" stroke-opacity="0.4" stroke-width="0.8"/>
    <text x="350" y="116" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#e2e8f0" text-anchor="middle">LangGraph</text>

    <!-- LangChain -->
    <rect x="295" y="130" width="110" height="22" rx="11" fill="url(#badge_bg)" stroke="#7ec8e3" stroke-opacity="0.4" stroke-width="0.8"/>
    <text x="350" y="144" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#e2e8f0" text-anchor="middle">LangChain</text>

    <!-- HuggingFace -->
    <rect x="295" y="158" width="110" height="22" rx="11" fill="url(#badge_bg)" stroke="#7ec8e3" stroke-opacity="0.4" stroke-width="0.8"/>
    <text x="350" y="172" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#e2e8f0" text-anchor="middle">HuggingFace</text>

    <!-- Ollama -->
    <rect x="295" y="186" width="110" height="22" rx="11" fill="url(#badge_bg)" stroke="#7ec8e3" stroke-opacity="0.4" stroke-width="0.8"/>
    <text x="350" y="200" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#e2e8f0" text-anchor="middle">Ollama</text>
  </g>

  <!-- COLUMN 3: BACKENDS & TOOLS -->
  <g>
    <text x="550" y="88" font-family="'Courier New', Consolas, monospace" font-size="10.5" font-weight="bold" fill="#38bdf8" text-anchor="middle" letter-spacing="1.5" filter="url(#tg)">BACKEND / DEV</text>
    
    <!-- FastAPI -->
    <rect x="495" y="102" width="110" height="22" rx="11" fill="url(#badge_bg)" stroke="#7c3aed" stroke-opacity="0.4" stroke-width="0.8"/>
    <text x="550" y="116" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#e2e8f0" text-anchor="middle">FastAPI</text>

    <!-- React -->
    <rect x="495" y="130" width="110" height="22" rx="11" fill="url(#badge_bg)" stroke="#7c3aed" stroke-opacity="0.4" stroke-width="0.8"/>
    <text x="550" y="144" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#e2e8f0" text-anchor="middle">React</text>

    <!-- Node.js / Docker -->
    <rect x="495" y="158" width="52" height="22" rx="11" fill="url(#badge_bg)" stroke="#7c3aed" stroke-opacity="0.4" stroke-width="0.8"/>
    <text x="521" y="172" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#e2e8f0" text-anchor="middle">Node</text>

    <rect x="553" y="158" width="52" height="22" rx="11" fill="url(#badge_bg)" stroke="#7c3aed" stroke-opacity="0.4" stroke-width="0.8"/>
    <text x="579" y="172" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#e2e8f0" text-anchor="middle">Docker</text>

    <!-- Flask / n8n -->
    <rect x="495" y="186" width="52" height="22" rx="11" fill="url(#badge_bg)" stroke="#7c3aed" stroke-opacity="0.4" stroke-width="0.8"/>
    <text x="521" y="200" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#e2e8f0" text-anchor="middle">Flask</text>

    <rect x="553" y="186" width="52" height="22" rx="11" fill="url(#badge_bg)" stroke="#7c3aed" stroke-opacity="0.4" stroke-width="0.8"/>
    <text x="579" y="200" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#e2e8f0" text-anchor="middle">n8n</text>
  </g>

  <!-- COLUMN 4: DATA & BI -->
  <g>
    <text x="750" y="88" font-family="'Courier New', Consolas, monospace" font-size="10.5" font-weight="bold" fill="#38bdf8" text-anchor="middle" letter-spacing="1.5" filter="url(#tg)">DATA / STORES</text>
    
    <!-- ChromaDB -->
    <rect x="695" y="102" width="110" height="22" rx="11" fill="url(#badge_bg)" stroke="#7ec8e3" stroke-opacity="0.4" stroke-width="0.8"/>
    <text x="750" y="116" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#e2e8f0" text-anchor="middle">ChromaDB</text>

    <!-- PostgreSQL -->
    <rect x="695" y="130" width="110" height="22" rx="11" fill="url(#badge_bg)" stroke="#7ec8e3" stroke-opacity="0.4" stroke-width="0.8"/>
    <text x="750" y="144" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#e2e8f0" text-anchor="middle">PostgreSQL</text>

    <!-- MySQL -->
    <rect x="695" y="158" width="110" height="22" rx="11" fill="url(#badge_bg)" stroke="#7ec8e3" stroke-opacity="0.4" stroke-width="0.8"/>
    <text x="750" y="172" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#e2e8f0" text-anchor="middle">MySQL</text>

    <!-- Power BI -->
    <rect x="695" y="186" width="110" height="22" rx="11" fill="url(#badge_bg)" stroke="#7ec8e3" stroke-opacity="0.4" stroke-width="0.8"/>
    <text x="750" y="200" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#e2e8f0" text-anchor="middle">Power BI</text>
  </g>
</svg>
